name: LocalBoxAssistant
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: '17.0'
  createIntermediateGroups: true
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.localbox.assistant
    SWIFT_VERSION: 5.10
    TARGETED_DEVICE_FAMILY: '1,2'
packages:
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-examples
    from: 2.22.4
targets:
  LocalBoxAssistant:
    type: application
    platform: iOS
    sources:
      - path: LocalBoxAssistant
    info:
      path: LocalBoxAssistant/Info.plist
      properties:
        CFBundleDisplayName: LocalBoxAssistant
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UIUserInterfaceStyle: Automatic
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
    dependencies:
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLX
