name: Build Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build Archive (No Code Signing)
        run: |
          xcodebuild archive \
            -project LocalBoxAssistant.xcodeproj \
            -scheme LocalBoxAssistant \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/LocalBoxAssistant.xcarchive \
            CODE_SIGNING_ALLOWED=NO

      - name: Package Unsigned IPA
        run: |
          mkdir -p build/Payload
          cp -R build/LocalBoxAssistant.xcarchive/Products/Applications/LocalBoxAssistant.app build/Payload/
          cd build
          /usr/bin/zip -r LocalBoxAssistant-unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalBoxAssistant-unsigned
          path: build/LocalBoxAssistant-unsigned.ipa
